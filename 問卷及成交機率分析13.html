        try {
          const clone = document.documentElement.cloneNode(true);
          // 移除腳本以確保匯出的 HTML 為純靜態報告，避免開啟時重新執行 React
          const scripts = clone.querySelectorAll('script');
          scripts.forEach(s => s.remove());
          
          const sidebar = clone.querySelector('#customer-selector-sidebar');
          if (sidebar) sidebar.remove();

          const mainContent = clone.querySelector('#analysis-main-content');
          if (mainContent) {
            mainContent.classList.remove('md:w-3/4');
            mainContent.classList.add('w-full');
          }

          // 根據需求移除截圖指定的元素
          const header = clone.querySelector('header');
          if (header) header.remove();

          const dpHeader = clone.querySelector('#decision-panel-header');
          if (dpHeader) dpHeader.remove();

          const btnReanalyze = clone.querySelector('#btn-reanalyze');
          if (btnReanalyze) btnReanalyze.remove();

          const exportPrintBtns = clone.querySelector('#export-print-btns');
          if (exportPrintBtns) exportPrintBtns.remove();

          // 注入原生 JS 以維持匯出後的靜態 HTML 風琴式互動，並預設全部收合
          const injectedScript = document.createElement('script');
          
          // 使用字串陣列避免 Babel 解析龐大的模板字串 (Template Literals) 造成 SyntaxError
          const jsLines = [
            "document.addEventListener('DOMContentLoaded', function() {",
            "  const headers = document.querySelectorAll('.accordion-header');",
            "  const bodies = document.querySelectorAll('.accordion-body');",
            "  const arrows = document.querySelectorAll('.accordion-arrow');",
            "  const toggleBtn = document.getElementById('expand-collapse-btn');",
            "  let isAllExpanded = false;",
            "  bodies.forEach(b => { ",
            "    b.classList.remove('block'); ",
            "    b.classList.add('hidden'); ",
            "  });",
            "  arrows.forEach(a => a.classList.remove('rotate-180'));",
            "  if(toggleBtn) {",
            "    toggleBtn.childNodes.forEach(node => {",
            "      if(node.nodeType === 3 && node.nodeValue.includes('全部收合')) {",
            "        node.nodeValue = node.nodeValue.replace('全部收合', '全部展開');",
            "      }",
            "    });",
            "    const icon = toggleBtn.querySelector('svg');",
            "    if(icon) icon.classList.remove('rotate-180');",
            "  }",
            "  headers.forEach((header, index) => {",
            "    header.removeAttribute('onclick');",
            "    header.addEventListener('click', () => {",
            "      const body = bodies[index];",
            "      const arrow = arrows[index];",
            "      const isCurrentlyOpen = !body.classList.contains('hidden');",
            "      bodies.forEach(b => { b.classList.add('hidden'); b.classList.remove('block'); });",
            "      arrows.forEach(a => a.classList.remove('rotate-180'));",
            "      if (!isCurrentlyOpen) {",
            "        body.classList.remove('hidden');",
            "        body.classList.add('block');",
            "        arrow.classList.add('rotate-180');",
            "      }",
            "      checkAllExpandedState();",
            "    });",
            "  });",
            "  if (toggleBtn) {",
            "    toggleBtn.removeAttribute('onclick');",
            "    toggleBtn.addEventListener('click', () => {",
            "      isAllExpanded = !isAllExpanded;",
            "      bodies.forEach((body, index) => {",
            "        if (isAllExpanded) {",
            "          body.classList.remove('hidden');",
            "          body.classList.add('block');",
            "          arrows[index].classList.add('rotate-180');",
            "        } else {",
            "          body.classList.add('hidden');",
            "          body.classList.remove('block');",
            "          arrows[index].classList.remove('rotate-180');",
            "        }",
            "      });",
            "      updateBtnUI();",
            "    });",
            "  }",
            "  function checkAllExpandedState() {",
            "    if(!toggleBtn) return;",
            "    let openCount = 0;",
            "    bodies.forEach(b => { if(!b.classList.contains('hidden')) openCount++; });",
            "    isAllExpanded = (openCount === bodies.length && bodies.length > 0);",
            "    updateBtnUI();",
            "  }",
            "  function updateBtnUI() {",
            "    if(!toggleBtn) return;",
            "    const icon = toggleBtn.querySelector('svg');",
            "    if(icon) {",
            "       if(isAllExpanded) icon.classList.add('rotate-180');",
            "       else icon.classList.remove('rotate-180');",
            "    }",
            "    toggleBtn.childNodes.forEach(node => {",
            "      if(node.nodeType === 3) {",
            "        if(isAllExpanded && node.nodeValue.includes('全部展開')) {",
            "          node.nodeValue = node.nodeValue.replace('全部展開', '全部收合');",
            "        } else if (!isAllExpanded && node.nodeValue.includes('全部收合')) {",
            "          node.nodeValue = node.nodeValue.replace('全部收合', '全部展開');",
            "        }",
            "      }",
            "    });",
            "  }",
            "});"
          ];
          injectedScript.innerHTML = jsLines.join('\n');
          // 修正：HTMLElement 沒有 .body 屬性，必須使用 querySelector 尋找
          clone.querySelector('body').appendChild(injectedScript);

          const htmlContent = "<!DOCTYPE html>\n" + clone.outerHTML;
          const blob = new Blob([htmlContent], { type: "text/html;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          // 避免 Babel 將 ` 誤判導致 SyntaxError，改用傳統字串相加
          a.download = "客戶：" + selectedStudent.studentName + " 問卷分析.html";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch (err) {
          console.error("Export HTML Error:", err);
          alert("匯出發生錯誤，請檢查主控台紀錄。");
        }
      };

      return (
        <div className="animate-in fade-in duration-700 flex flex-col pb-6 min-h-screen md:min-h-[85vh] print:min-h-0 print:pb-0 print:h-auto">
          <div id="decision-panel-header" className="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white p-5 md:p-8 rounded-[2rem] md:rounded-[3.5rem] shadow-xl border border-slate-100 mb-6 shrink-0 gap-4 print:hidden">
            <h2 className="text-xl md:text-3xl font-black text-slate-800 flex items-center gap-3">🎯 單一客戶深度決策面板</h2>
            <button onClick={onBack} className="w-full sm:w-auto bg-slate-100 px-6 md:px-8 py-3 md:py-4 rounded-xl md:rounded-[2rem] font-black text-sm hover:bg-slate-200 text-center">返回主控台</button>
          </div>
          
          <div className="flex flex-col md:flex-row gap-6 flex-1 min-h-0 print:block">
            <div id="customer-selector-sidebar" className="w-full md:w-1/4 bg-white p-5 md:p-6 rounded-[2rem] md:rounded-[3rem] shadow-xl border flex flex-col shrink-0 print:hidden">
              <h3 className="text-lg font-black mb-4 flex items-center gap-2"><Icon name="Users" size={20} className="text-indigo-600"/> 選擇客戶</h3>
              
              <button 
                onClick={() => setShowMockData(!showMockData)}
                className={`w-full mb-4 py-3 rounded-2xl font-bold text-sm transition-all border-2 flex justify-center items-center gap-2 ${showMockData ? 'bg-rose-50 text-rose-600 border-rose-200 hover:bg-rose-100' : 'bg-indigo-50 text-indigo-600 border-indigo-200 hover:bg-indigo-100'}`}
              >
                {showMockData ? <><Icon name="Trash2" size={16}/> 移除範例資料</> : <><Icon name="UserPlus" size={16}/> 載入 5 筆範例</>}
              </button>

              {displayAnswers.length === 0 ? (
                <div className="text-center text-slate-400 py-6 md:py-10 font-bold text-sm">尚未有客戶加入</div>
              ) : (
                <div className="flex overflow-x-auto gap-3 pb-2 md:pb-0 md:flex-col md:overflow-y-auto md:space-y-3 custom-scrollbar pr-1">
                  {displayAnswers.map(s => (
                    <button key={s.studentId} onClick={() => setSelectedStudentId(s.studentId)} 
                      className={`shrink-0 w-40 md:w-full p-3 md:p-4 text-left rounded-[1.2rem] md:rounded-[1.5rem] font-bold transition-all border-2 ${selectedStudentId === s.studentId ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg' : 'bg-slate-50 text-slate-700 border-transparent hover:bg-slate-100 hover:border-slate-200'}`}>
                      <div className="truncate text-sm md:text-base">{s.studentName}</div>
                      <div className={`text-[10px] mt-1 truncate ${selectedStudentId === s.studentId ? 'text-indigo-200' : (s.status === 'submitted' ? 'text-emerald-500' : 'text-slate-400')}`}>
                        {s.status === 'submitted' ? '✅ 已提交' : '⏳ 填寫中'}
                      </div>
                    </button>
                  ))}
                </div>
              )}
            </div>

            <div id="analysis-main-content" className="w-full md:w-3/4 bg-white p-5 md:p-8 rounded-[2rem] md:rounded-[3rem] shadow-xl border flex flex-col relative print:w-full print:border-none print:shadow-none print:p-0 print:m-0">
              {selectedStudent ? (
                <div className="h-full flex flex-col print:block">
                  
                  <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 shrink-0 border-b pb-4 gap-4 print:flex-row print:mb-4">
                    <div>
                      {/* 已將標題從「專屬剖析」改為「問卷分析」 */}
                      <h3 className="text-xl md:text-2xl font-black text-slate-800">客戶：<span className="text-indigo-600">{selectedStudent.studentName}</span> 的問卷分析</h3>
                      <p className="text-xs font-bold text-slate-400 mt-1">根據此客戶的真實填答數據生成</p>
                    </div>
                    <button id="btn-reanalyze" onClick={runDetailedAi} disabled={isAnalyzing} className="print:hidden w-full sm:w-auto bg-indigo-600 text-white px-5 py-3 md:px-6 md:py-3 rounded-xl md:rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-2 disabled:opacity-50">
                      {isAnalyzing ? <Icon name="RefreshCw" className="animate-spin" size={18}/> : <Icon name="BrainCircuit" size={18}/>} 
                      {isAnalyzing ? "正在精算中..." : (existingAnalysis ? "重新綜合建議" : "綜合建議")}
                    </button>
                  </div>

                  <div className="flex-1 md:overflow-y-auto pr-2 md:pr-4 custom-scrollbar space-y-8 md:space-y-12 print:overflow-visible print:pr-0">
                    {!existingAnalysis && !isAnalyzing && (
                      <div className="bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-10 text-center space-y-4 print:hidden">
                        <div className="w-16 h-16 md:w-20 md:h-20 bg-indigo-100 text-indigo-400 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="BrainCircuit" size={32} className="md:w-10 md:h-10"/></div>
                        <h4 className="text-lg md:text-xl font-black text-indigo-900">解鎖專屬綜合心理學剖析</h4>
                        <p className="text-sm md:text-base font-bold text-indigo-600 max-w-lg mx-auto leading-relaxed">
                          系統已為您自動載入下方各題的「內建專屬對策」。<br/><br/>
                          若需進一步整合該客戶的所有回答，精算其 <strong>PERSONA、MBTI、DISC 與心理地圖</strong>，請點擊右上方「綜合建議」按鈕。
                        </p>
                      </div>
                    )}
                    
                    {isAnalyzing && (
                      <div className="flex flex-col items-center justify-center h-48 md:h-64 text-center space-y-6 print:hidden">
                        <Icon name="Loader2" size={40} className="animate-spin text-indigo-500 md:w-12 md:h-12"/>
                        <p className="text-sm md:text-base font-black text-indigo-600 animate-pulse">正在透過心理學模型精算客戶潛意識...</p>
                      </div>
                    )}

                    {existingAnalysis && !isAnalyzing && (
                        <div className="space-y-6 print-break-inside-avoid">
                          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <h4 className="text-lg md:text-xl font-black text-slate-800 flex items-center gap-2 border-l-4 border-emerald-500 pl-3">
                              <Icon name="Activity" className="text-emerald-500"/> 客戶屬性及心理論綜合分析
                            </h4>
                            <div id="export-print-btns" className="flex gap-2 print:hidden">
                              <button onClick={handleExportHTML} className="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-indigo-100 transition-colors shadow-sm border border-indigo-100">
                                <Icon name="Download" size={16}/> 另存 HTML
                              </button>
                              <button onClick={() => { 
                                const originalTitle = document.title;
                                document.title = `客戶：${selectedStudent.studentName} 問卷分析`;
                                window.focus(); 
                                setTimeout(() => { 
                                  window.print(); 
                                  setTimeout(() => { document.title = originalTitle; }, 500);
                                }, 100); 
                              }} className="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-slate-200 transition-colors shadow-sm">
                                <Icon name="Printer" size={16}/> 列印報告
                              </button>
                            </div>
                          </div>
                          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                            <div className="bg-blue-50 p-5 md:p-6 rounded-2xl md:rounded-3xl border border-blue-100 shadow-sm print:border print:border-gray-300">
                              <div className="text-[10px] md:text-xs font-black text-blue-400 mb-2 tracking-widest uppercase">
                                {renderAnalysisText('PERSONA 人物誌', true)}
                              </div>
                              <div className="text-xs md:text-sm font-bold text-slate-700 leading-relaxed">{existingAnalysis.comprehensive?.persona}</div>
                            </div>
                            <div className="bg-purple-50 p-5 md:p-6 rounded-2xl md:rounded-3xl border border-purple-100 shadow-sm print:border print:border-gray-300">
                              <div className="text-[10px] md:text-xs font-black text-purple-400 mb-2 tracking-widest uppercase">
                                {renderAnalysisText('MBTI 推測', true)}
                              </div>
                              <div className="text-xs md:text-sm font-bold text-slate-700 leading-relaxed">{existingAnalysis.comprehensive?.mbti}</div>
                            </div>
                            <div className="bg-amber-50 p-5 md:p-6 rounded-2xl md:rounded-3xl border border-amber-100 shadow-sm print:border print:border-gray-300">
                              <div className="text-[10px] md:text-xs font-black text-amber-500 mb-2 tracking-widest uppercase">
                                {renderAnalysisText('DISC 型態', true)}
                              </div>
                              <div className="text-xs md:text-sm font-bold text-slate-700 leading-relaxed">{existingAnalysis.comprehensive?.disc}</div>
                            </div>
                            <div className="bg-rose-50 p-5 md:p-6 rounded-2xl md:rounded-3xl border border-rose-100 shadow-sm print:border print:border-gray-300">
                              <div className="text-[10px] md:text-xs font-black text-rose-400 mb-2 tracking-widest uppercase">
                                {renderAnalysisText('心理地圖與動機', true)}
                              </div>
                              <div className="text-xs md:text-sm font-bold text-slate-700 leading-relaxed">{existingAnalysis.comprehensive?.psychMap}</div>
                            </div>
                          </div>

                          <div className="grid lg:grid-cols-2 gap-4 md:gap-6 mt-6">
                            <div className="bg-indigo-900 text-white p-6 md:p-8 rounded-[2rem] md:rounded-[2.5rem] shadow-xl print:bg-gray-100 print:text-black print:border print:border-gray-300 print:shadow-none">
                              <h5 className="font-black text-base md:text-lg mb-4 md:mb-6 flex items-center gap-2 print:text-black"><Icon name="Target" className="text-emerald-400 print:hidden"/> 面對此客戶的訴求 5 大重點</h5>
                              <ul className="space-y-3 md:space-y-4">
                                {existingAnalysis.comprehensive?.appealPoints?.map((pt, i) => (
                                  <li key={i} className="flex gap-3 items-start text-xs md:text-sm font-medium leading-relaxed">
                                    <span className="bg-emerald-500 text-white w-5 h-5 md:w-6 md:h-6 rounded-full flex items-center justify-center shrink-0 font-black text-[10px] md:text-xs mt-0.5 print:bg-gray-300 print:text-black">{i+1}</span>
                                    {pt}
                                  </li>
                                ))}
                              </ul>
                            </div>
                            <div className="bg-white border-4 border-red-50 p-6 md:p-8 rounded-[2rem] md:rounded-[2.5rem] shadow-xl print:border print:border-gray-300 print:shadow-none">
                              <h5 className="font-black text-base md:text-lg mb-4 md:mb-6 flex items-center gap-2 text-red-600 print:text-black"><Icon name="AlertOctagon" className="text-red-500 print:hidden"/> 絕對避開的 5 大注意事項</h5>
                              <ul className="space-y-3 md:space-y-4">
                                {existingAnalysis.comprehensive?.precautions?.map((pt, i) => (
                                  <li key={i} className="flex gap-3 items-start text-xs md:text-sm font-medium leading-relaxed text-red-600">
                                    <span className="bg-red-100 text-red-600 w-5 h-5 md:w-6 md:h-6 rounded-full flex items-center justify-center shrink-0 font-black text-[10px] md:text-xs mt-0.5 print:bg-gray-300 print:text-black">{i+1}</span>
                                    {pt}
                                  </li>
                                ))}
                              </ul>
                            </div>
                          </div>
                        </div>
                    )}

                    {!isAnalyzing && (
                        <div className="space-y-6 pt-6 border-t-2 border-dashed border-slate-200 print:mt-8 print:border-solid">
                          
                          {/* 加入全部展開 / 縮合按鈕區域 */}
                          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4 md:mb-6">
                            <h4 className="text-lg md:text-xl font-black text-slate-800 flex items-center gap-2 border-l-4 border-indigo-500 pl-3">
                              <Icon name="ListChecks" className="text-indigo-500"/> 逐題作答解析與對策
                            </h4>
                            <button 
                              id="expand-collapse-btn"
                              onClick={toggleExpandAll} 
                              className="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-indigo-100 transition-colors shadow-sm border border-indigo-100 print:hidden active:scale-95"
                            >
                              <Icon 
                                name="ChevronsUpDown" 
                                size={16} 
                                className={`transition-transform duration-500 ${isAllExpanded ? 'rotate-180' : ''}`} 
                              />
                              {isAllExpanded ? "全部收合" : "全部展開"}
                            </button>
                          </div>

                          <div className="space-y-4 md:space-y-6">
                            {session.questions.map((q, idx) => {
                              const ansStr = selectedStudent.answers[idx] || "客戶未回答此題";
                              const qnaData = existingAnalysis?.qnaAnalysis?.find(a => a.qIndex === idx);
                              const isExpanded = expandedIndices.includes(idx);
                              
                              let theoryText = q.analysis || "尚無分析資料";
                              let builtInAdvice = "";
                              let builtInPrecautions = "";
                              
                              if (!qnaData && q.analysis) {
                                  let optionsHtml = q.analysis;
                                  
                                  const parts = q.analysis.split(/<br><br><span class='text-red-500 font-bold'>⚠️ 應注意事項：<\/span>/);
                                  builtInPrecautions = parts.length > 1 ? parts[1].trim() : "無特別注意事項";
                                  
                                  const topParts = parts[0].split('具體建議：<br><br>');
                                  theoryText = topParts[0] + '具體建議：';
                                  optionsHtml = topParts.length > 1 ? topParts[1] : parts[0];

                                  let isChoice = false;
                                  let optNum = "";
                                  if (ansStr) {
                                     const match = ansStr.match(/^(\d+)/);
                                     if (match) { isChoice = true; optNum = match[1]; }
                                  }

                                  if (isChoice) {
                                      const searchStr = `<span class='text-indigo-600 font-bold'>【選${optNum}】</span>`;
                                      const startIndex = optionsHtml.indexOf(searchStr);
                                      if (startIndex !== -1) {
                                          let endIndex = optionsHtml.indexOf(`<br><span class='text-indigo-600 font-bold'>【選`, startIndex + searchStr.length);
                                          if (endIndex === -1) endIndex = optionsHtml.length;
                                          builtInAdvice = optionsHtml.substring(startIndex + searchStr.length, endIndex).trim();
                                          if (builtInAdvice.endsWith('<br>')) builtInAdvice = builtInAdvice.slice(0, -4).trim();
                                          builtInAdvice = `<span class='text-indigo-600 font-black'>【實戰方針】</span> ${builtInAdvice}`;
                                      } else {
                                          builtInAdvice = "此選項無預設分析。";
                                      }
                                  } else {
                                      builtInAdvice = optionsHtml;
                                  }
                              }

                              return (
                                <div key={idx} className="bg-slate-50 rounded-[2rem] md:rounded-[2.5rem] border border-slate-200 shadow-sm print-break-inside-avoid print:border-gray-300 overflow-visible">
                                  {/* 手風琴可點擊標題列 */}
                                  <div 
                                    className="accordion-header p-5 md:p-8 cursor-pointer flex justify-between items-start transition-colors hover:bg-slate-100 rounded-[2rem] md:rounded-[2.5rem]"
                                    onClick={() => toggleAccordion(idx)}
                                  >
                                    <div className="relative group font-black text-slate-800 text-base md:text-lg flex flex-col sm:flex-row sm:items-start gap-2 md:gap-3 leading-snug w-full">
                                      <div className="flex gap-2 md:gap-3">
                                        <span className="text-indigo-500 shrink-0">Q{idx+1}.</span> 
                                        <span className="border-b-2 border-dashed border-indigo-200 transition-colors group-hover:border-indigo-400 print:border-none">{q.question}</span>
                                      </div>
                                      
                                      <div className="absolute top-full left-0 sm:left-8 mt-2 w-[280px] sm:w-[400px] bg-slate-800 text-white p-4 rounded-2xl shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-[100] pointer-events-none border border-slate-700 print:hidden">
                                        <div className="text-[10px] text-indigo-300 mb-2 font-black tracking-widest uppercase">本題選項參考：</div>
                                        {q.type === 'choice' && q.options ? (
                                          <ul className="space-y-1.5 text-xs sm:text-sm font-medium">
                                            {q.options.map((opt, oIdx) => (
                                              <li key={oIdx} className="flex gap-2 items-start"><span className="text-indigo-400 shrink-0 mt-0.5">•</span> <span>{opt}</span></li>
                                            ))}
                                          </ul>
                                        ) : (
                                          <div className="text-xs sm:text-sm font-medium text-slate-300">此題為簡答題，無預設選項。</div>
                                        )}
                                      </div>
                                    </div>

                                    {/* 展開指示箭頭 SVG 翻轉動畫 */}
                                    <div className={`accordion-arrow shrink-0 ml-4 mt-1 transition-transform duration-300 ${isExpanded ? 'rotate-180' : ''}`}>
                                      <Icon name="ChevronDown" className="text-slate-400 print:hidden" />
                                    </div>
                                  </div>

                                  {/* 手風琴折疊內容區塊 (列印時強迫全部展開) */}
                                  <div className={`accordion-body ${isExpanded ? 'block animate-in fade-in slide-in-from-top-2 duration-300' : 'hidden'} px-5 md:px-8 pb-5 md:pb-8 pt-0 print:block print:p-5 md:print:p-8`}>
                                    <div className="bg-white p-3 md:p-4 rounded-xl md:rounded-2xl border-l-4 border-emerald-500 font-bold text-emerald-700 shadow-inner mb-6 text-sm md:text-base print:border-gray-400 print:shadow-none mt-2">
                                      客戶的真實回答： {ansStr}
                                    </div>
                                    
                                    {qnaData ? (
                                      <div className="grid md:grid-cols-2 gap-4 md:gap-6">
                                        <div>
                                          <h6 className="text-[10px] md:text-xs font-black text-indigo-500 uppercase tracking-widest mb-2 print:text-black">💡 AI 深入實戰對策</h6>
                                          <p className="text-xs md:text-sm font-bold text-slate-700 leading-relaxed bg-indigo-50 p-4 rounded-xl md:rounded-2xl print:bg-gray-100">{qnaData.advice}</p>
                                        </div>
                                        <div>
                                          <h6 className="text-[10px] md:text-xs font-black text-red-500 uppercase tracking-widest mb-2 print:text-black">⚠️ 專屬應注意事項</h6>
                                          <p className="text-xs md:text-sm font-bold text-red-600 leading-relaxed bg-red-50 p-4 rounded-xl md:rounded-2xl print:bg-gray-100">{qnaData.precautions}</p>
                                        </div>
                                      </div>
                                    ) : (
                                      <div className="grid md:grid-cols-2 gap-4 md:gap-6">
                                        <div className="bg-indigo-50/50 border border-indigo-100 p-4 md:p-6 rounded-xl md:rounded-2xl print:bg-gray-100 print:border-gray-300">
                                          <h6 className="text-[10px] md:text-xs font-black text-indigo-600 uppercase tracking-widest mb-3 flex items-center gap-2 print:text-black"><Icon name="BookOpen" size={16} className="print:hidden"/> 專屬對策與話術引導</h6>
                                          <div className="text-xs md:text-sm text-slate-700 leading-relaxed">
                                            {renderAnalysisText(`${theoryText}<br><br>${builtInAdvice}`)}
                                          </div>
                                        </div>
                                        <div className="bg-red-50/50 border border-red-100 p-4 md:p-6 rounded-xl md:rounded-2xl print:bg-gray-100 print:border-gray-300">
                                          <h6 className="text-[10px] md:text-xs font-black text-red-600 uppercase tracking-widest mb-3 flex items-center gap-2 print:text-black"><Icon name="AlertOctagon" size={16} className="print:hidden"/> 應注意事項</h6>
                                          <div className="text-xs md:text-sm font-bold text-red-600 leading-relaxed">
                                            {renderAnalysisText(builtInPrecautions)}
                                          </div>
                                        </div>
                                      </div>
                                    )}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                    )}
                  </div>
                </div>
              ) : (
                <div className="h-full flex items-center justify-center text-slate-400 font-bold text-sm md:text-base print:hidden">請先於左側選擇要分析的客戶</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function StudentDashboard({ session, myData, onAnswer, onFinalSubmit }) {
      const [idx, setIdx] = useState(0);
      const q = session.questions[idx];
      const selected = myData?.answers?.[idx] || '';
      const color = session.quizTitleColor || DEFAULT_TITLE_COLOR;

      if (session.status === 'lobby') return <div className="h-[60vh] md:h-[70vh] flex flex-col items-center justify-center text-center p-8 md:p-12 bg-white rounded-[3rem] md:rounded-[4rem] shadow-2xl border animate-pulse mx-4 md:mx-0" style={{ borderColor: `${color}20` }}><Icon name="Clock" size={48} className="mb-6 md:mb-8 md:w-16 md:h-16" color={color} /><h2 className="text-xl md:text-2xl font-black" style={{ color }}>問卷尚未啟動，請稍候 🙌</h2></div>;
      if (myData?.status === 'submitted') return <div className="max-w-xl mx-auto mt-10 md:mt-20 p-10 md:p-16 bg-white rounded-[3rem] md:rounded-[4rem] shadow-2xl text-center border-2 mx-4 md:mx-auto" style={{ borderColor: `${color}20` }}><Icon name="CheckCircle" size={64} className="mx-auto mb-8 md:mb-10 text-emerald-500" /><h2 className="text-2xl md:text-3xl font-black">填寫完成，感謝您的回覆！✨</h2></div>;

      return (
        <div className="max-w-2xl mx-auto space-y-6 md:space-y-8 pb-10 px-2 sm:px-0">
          <div className="bg-white rounded-[3rem] md:rounded-[4rem] shadow-2xl overflow-hidden border-2 border-white">
             <div className="p-8 md:p-14" style={{ backgroundColor: `${color}10`, borderBottom: `1px solid ${color}30` }}>
               <h3 className="font-black leading-snug text-slate-800" style={{ fontSize: `${session.questionFontSize || 28}px`, color: color }}>{q?.question}</h3>
             </div>
             <div className="p-6 md:p-14 pt-4 md:pt-6 text-slate-700">
               {q?.type === 'choice' ? (
                 <div className="space-y-3 md:space-y-4">
                   {q.options.map((opt, i) => (
                     <button key={i} onClick={() => onAnswer(idx, opt)} 
                      className={`w-full p-5 md:p-6 rounded-[1.5rem] md:rounded-[2rem] text-left font-black border-2 transition-all flex items-center gap-4 md:gap-5 active:scale-95 ${selected === opt ? 'bg-white shadow-xl' : 'border-slate-50 bg-slate-50/50 text-slate-500 hover:bg-white'}`} 
                      style={{ borderColor: selected === opt ? color : 'transparent', color: selected === opt ? color : undefined, fontSize: `${session.optionFontSize || 18}px` }}>
                        
                        <div className="w-5 h-5 md:w-6 md:h-6 rounded-full border-2 shrink-0 flex items-center justify-center transition-all" style={{ borderColor: selected === opt ? color : '#e2e8f0', backgroundColor: selected === opt ? color : 'transparent' }}>
                          {selected === opt && <div className="w-2 h-2 md:w-2.5 md:h-2.5 rounded-full bg-white shadow-sm"></div>}
                        </div>
                        
                        <span className="flex-1 whitespace-normal break-words leading-tight">{opt}</span>
                     </button>
                   ))}
                 </div>
               ) : <textarea value={selected} onChange={e=>onAnswer(idx, e.target.value)} className="w-full p-6 md:p-8 bg-slate-50 border-2 border-slate-50 rounded-[2rem] md:rounded-[3rem] h-48 md:h-64 outline-none focus:bg-white transition-all font-bold text-slate-700 shadow-inner resize-none" style={{ fontSize: `${session.optionFontSize || 18}px` }} placeholder="請在此輸入您的回饋... 💡" />}
             </div>
          </div>
          <div className="flex gap-4 md:gap-5">
             <button disabled={idx === 0} onClick={()=>setIdx(idx-1)} className="w-16 md:w-24 h-16 md:h-24 bg-white border-2 border-white text-slate-400 rounded-full flex items-center justify-center shadow-xl disabled:opacity-20 hover:bg-slate-50 transition-all active:scale-90 shrink-0"><Icon name="ChevronLeft" size={28} className="md:w-8 md:h-8" /></button>
             <button onClick={() => idx === session.questions.length - 1 ? onFinalSubmit() : setIdx(idx+1)} className="flex-1 h-16 md:h-24 text-white font-black text-lg md:text-2xl rounded-[2rem] md:rounded-[3rem] shadow-2xl transition-all active:scale-[0.98] flex items-center justify-center gap-3 md:gap-4 btn-action" style={{ backgroundColor: color, boxShadow: `0 10px 25px -5px ${color}40` }}>{idx === session.questions.length - 1 ? '提交回覆 ✅' : '下一步'} <Icon name="ArrowRight" size={24} className="md:w-7 md:h-7" /></button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
